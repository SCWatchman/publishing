name: KDP Gold‑Standard Style Check
on:
  push:
    paths:
      - 'nyt-cyber-expose/kdp/manuscript/chapter_drafts/**/*.md'
jobs:
  style_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up script permissions
        run: chmod +x scripts/run_kdp_edit.sh
      - name: Find changed markdown files
        id: files
        run: |
          echo "files=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '\\.md$' | tr '\n' ' ')" >> $GITHUB_OUTPUT
      - name: Run gold‑standard check on each file
        if: steps.files.outputs.files != ''
        run: |
          for f in ${{ steps.files.outputs.files }}; do
            echo "Checking $f"
            scripts/run_kdp_edit.sh "$f" --verify || exit 1
          done
